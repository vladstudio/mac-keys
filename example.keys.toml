# Keys configuration — https://keys.vlad.studio
#
# Key names: a-z, 0-9, f1-f20, return, tab, space, delete, escape,
#   caps_lock, forward_delete, up, down, left, right,
#   minus, equal, left_bracket, right_bracket, backslash,
#   semicolon, quote, grave, comma, period, slash,
#   shift, control, option, command (and right_* variants)
#
# Modifiers in combos: option+shift+a
# Sequences: option, option  (within 400ms)

# --- Remaps ---

[[remap]]
input = "caps_lock"
output = "f20"

# Double-tap option to trigger Ctrl+Space
# [[remap]]
# input = "option, option"
# output = "control+space"

# --- Snippets ---

[[snippet]]
trigger = ":hi"
replacement = "Hello world"

[[snippet]]
trigger = ":sig"
replacement = """
Best regards,
Vlad
"""
